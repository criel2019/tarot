<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>별빛 타로 — 운명의 안내소</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Noto+Serif+KR:wght@300;400;600&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#06030f;--surface:rgba(16,10,32,.92);--border:rgba(201,168,76,.25);
  --gold:#c9a84c;--gold-hi:#e8c96d;--gold-lo:#7a6230;
  --purple:#7b6ef0;--purple-lo:#3d2a7a;--indigo:#1a1040;
  --text:#e8e4dc;--text-2:#a8a0c0;--text-3:#5a5080;
  --red-soft:#cf6655;--green-soft:#5ecf65;
}
html{scroll-behavior:smooth}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow:hidden;user-select:none;-webkit-user-select:none}

/* ===== LOADER ===== */
#loader{position:fixed;inset:0;z-index:9999;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .8s}
#loader.hidden{opacity:0;pointer-events:none}
.loader-orb{width:60px;height:60px;border-radius:50%;border:2px solid var(--gold-lo);border-top-color:var(--gold);animation:spin 1s linear infinite}
.loader-text{margin-top:1.2rem;font-family:'Cinzel',serif;color:var(--gold-lo);font-size:.85rem;letter-spacing:.3em}
@keyframes spin{to{transform:rotate(360deg)}}

/* ===== 3D CANVAS ===== */
#c3d{position:fixed;inset:0;width:100%;height:100%;z-index:0}

/* ===== INTRO CURTAIN ===== */
#intro{position:fixed;inset:0;z-index:100;pointer-events:none}
.curtain-l,.curtain-r{position:absolute;top:0;bottom:0;width:52%;transition:transform 1.8s cubic-bezier(.65,0,.35,1);z-index:101;box-shadow:0 0 60px rgba(0,0,0,.8)}
.curtain-l{left:0;transform:translateX(0);border-right:3px solid var(--gold-lo);background:linear-gradient(90deg,#1a0825 0%,#2d1040 40%,#1a0825 100%)}
.curtain-r{right:0;transform:translateX(0);border-left:3px solid var(--gold-lo);background:linear-gradient(90deg,#1a0825 0%,#2d1040 60%,#1a0825 100%)}
.curtain-l::before,.curtain-r::before{content:'';position:absolute;top:0;bottom:0;width:40px;background:repeating-linear-gradient(180deg,transparent,transparent 18px,rgba(201,168,76,.08) 18px,rgba(201,168,76,.08) 20px)}
.curtain-l::before{right:0}.curtain-r::before{left:0}
.curtain-l.open{transform:translateX(-105%)}
.curtain-r.open{transform:translateX(105%)}
.intro-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:102;transition:opacity 1s}
.intro-center.hidden{opacity:0}
.intro-title{font-family:'Cinzel',serif;font-size:clamp(1rem,3vw,1.6rem);color:var(--gold);letter-spacing:.4em;opacity:0;animation:fadeUp 1.5s ease .3s forwards}
.intro-sub{font-family:'Noto Serif KR',serif;font-size:clamp(.8rem,2vw,1rem);color:var(--text-2);margin-top:.8rem;opacity:0;animation:fadeUp 1.5s ease .8s forwards;font-weight:300}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

/* ===== STAR PARTICLES ===== */
.stars{position:fixed;inset:0;z-index:1;pointer-events:none;overflow:hidden}
.star{position:absolute;width:3px;height:3px;background:var(--gold);border-radius:50%;opacity:0;animation:twinkle var(--dur) ease-in-out var(--delay) infinite}
@keyframes twinkle{0%,100%{opacity:0;transform:scale(.5)}50%{opacity:var(--bright);transform:scale(1)}}

/* ===== HUD ===== */
#hud{position:fixed;top:0;left:0;right:0;z-index:50;text-align:center;padding:1rem;opacity:0;transition:opacity 1s}
#hud.show{opacity:1}
.hud-title{font-family:'Cinzel',serif;font-size:.7rem;letter-spacing:.5em;color:var(--gold-lo);text-transform:uppercase}

/* ===== DIALOGUE BOX ===== */
#dialogue{position:fixed;bottom:0;left:0;right:0;z-index:60;padding:0 1rem 1.2rem;opacity:0;transform:translateY(30px);transition:all .5s cubic-bezier(.4,0,.2,1);pointer-events:none}
#dialogue.show{opacity:1;transform:translateY(0);pointer-events:auto}
.dlg-box{max-width:700px;margin:0 auto;background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:1.2rem 1.4rem 1rem;backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);position:relative;cursor:pointer;min-height:90px}
.dlg-box::before{content:'';position:absolute;inset:-1px;border-radius:16px;background:linear-gradient(135deg,rgba(201,168,76,.15),transparent 50%);z-index:-1;pointer-events:none}
.dlg-header{display:flex;align-items:center;gap:.6rem;margin-bottom:.5rem}
.dlg-icon{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0}
.dlg-icon.bt{background:linear-gradient(135deg,#1a1a3e,#2a2050);border:1px solid var(--gold-lo)}
.dlg-icon.rb{background:linear-gradient(135deg,#3a2015,#4a2820);border:1px solid #c08050}
.dlg-name{font-family:'Cinzel',serif;font-size:.75rem;letter-spacing:.15em;color:var(--gold)}
.dlg-name.rb-name{color:#e0a070}
.dlg-text{font-family:'Noto Serif KR',serif;font-size:.95rem;line-height:1.7;color:var(--text);min-height:1.4em;font-weight:300}
.dlg-indicator{position:absolute;bottom:8px;right:14px;color:var(--gold-lo);font-size:.7rem;animation:bounce .8s ease-in-out infinite}
.dlg-indicator.hidden{display:none}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(4px)}}

/* ===== DEBUG CONSOLE ===== */
#debugToggle{position:fixed;bottom:16px;right:16px;z-index:99999;width:44px;height:44px;border-radius:50%;border:1px solid rgba(201,168,76,.3);background:rgba(16,10,32,.85);color:var(--gold);font-size:1.2rem;cursor:pointer;backdrop-filter:blur(8px);transition:all .2s;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 12px rgba(0,0,0,.5)}
#debugToggle:hover{border-color:var(--gold);box-shadow:0 0 16px rgba(201,168,76,.25)}
#debugPanel{position:fixed;bottom:70px;right:16px;z-index:99999;width:min(420px,90vw);max-height:50vh;background:rgba(10,6,20,.95);border:1px solid rgba(201,168,76,.25);border-radius:12px;backdrop-filter:blur(12px);display:none;flex-direction:column;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,.6)}
#debugPanel.show{display:flex}
.debug-header{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border-bottom:1px solid rgba(201,168,76,.15);font-family:'Cinzel',serif;font-size:.7rem;letter-spacing:.15em;color:var(--gold)}
.debug-header div{display:flex;gap:4px}
.debug-copy,.debug-clear,.debug-close{border:none;background:rgba(255,255,255,.08);color:var(--text-2);font-size:.7rem;padding:4px 8px;border-radius:6px;cursor:pointer;transition:background .15s}
.debug-copy:hover,.debug-clear:hover,.debug-close:hover{background:rgba(255,255,255,.15);color:#fff}
.debug-logs{flex:1;overflow-y:auto;padding:8px 10px;font-family:'Courier New',monospace;font-size:.72rem;line-height:1.5;color:#c0c0c0;max-height:45vh;scrollbar-width:thin;scrollbar-color:rgba(201,168,76,.3) transparent}
.debug-logs::-webkit-scrollbar{width:5px}
.debug-logs::-webkit-scrollbar-thumb{background:rgba(201,168,76,.3);border-radius:3px}
.debug-entry{padding:2px 0;border-bottom:1px solid rgba(255,255,255,.04);word-break:break-all}
.debug-entry.log{color:#c0c0c0}
.debug-entry.info{color:#6eb5ff}
.debug-entry.warn{color:#ffd666}
.debug-entry.error{color:#ff6b6b}
.debug-time{color:var(--text-3);margin-right:6px}

/* ===== OPTIONS ===== */
#options{position:fixed;bottom:0;left:0;right:0;z-index:65;padding:0 1rem 1.2rem;display:flex;flex-direction:column;align-items:center;gap:.5rem;opacity:0;transform:translateY(20px);transition:all .4s;pointer-events:none}
#options.show{opacity:1;transform:translateY(0);pointer-events:auto}
.opt-btn{max-width:500px;width:100%;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:.8rem 1.2rem;color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:.9rem;cursor:pointer;transition:all .25s;text-align:left;backdrop-filter:blur(12px)}
.opt-btn:hover{background:rgba(123,110,240,.12);border-color:var(--purple);transform:translateX(4px)}
.opt-btn:active{transform:scale(.98)}

/* ===== TOPIC & SPREAD BUTTONS ===== */
.select-panel{position:fixed;bottom:8rem;left:0;right:0;z-index:65;display:flex;flex-wrap:wrap;justify-content:center;gap:.7rem;padding:0 1.5rem;opacity:0;transform:translateY(20px);transition:all .5s;pointer-events:none}
.select-panel.show{opacity:1;transform:translateY(0);pointer-events:auto}
.sel-btn{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:1rem 1.4rem;color:var(--text);cursor:pointer;transition:all .3s;text-align:center;backdrop-filter:blur(12px);min-width:120px}
.sel-btn:hover{border-color:var(--gold);box-shadow:0 0 20px rgba(201,168,76,.15);transform:translateY(-3px)}
.sel-btn:active{transform:scale(.96)}
.sel-btn .sel-icon{font-size:1.6rem;display:block;margin-bottom:.4rem}
.sel-btn .sel-label{font-size:.85rem;font-weight:500}
.sel-btn .sel-desc{font-size:.7rem;color:var(--text-2);margin-top:.2rem}

/* ===== CARD AREA ===== */
#cardArea{position:fixed;top:50%;left:50%;transform:translate(-50%,-55%);z-index:55;display:flex;gap:1.2rem;opacity:0;transition:all .6s;pointer-events:none}
#cardArea.show{opacity:1;pointer-events:auto}
.card-slot{width:130px;height:210px;perspective:1000px;cursor:pointer;transition:transform .3s;position:relative}
.card-slot:hover:not(.flipped){transform:translateY(-8px)}
.card-slot.flipped{cursor:default}
.card-inner{position:relative;width:100%;height:100%;transition:transform .8s cubic-bezier(.4,0,.2,1);transform-style:preserve-3d}
.card-slot.flipped .card-inner{transform:rotateY(180deg)}
.card-back,.card-front{position:absolute;inset:0;backface-visibility:hidden;border-radius:10px;overflow:hidden}

.card-back{background:linear-gradient(135deg,#1a0a2e 0%,#2d1550 50%,#1a0a2e 100%);border:2px solid var(--gold-lo);display:flex;align-items:center;justify-content:center}
.card-back::before{content:'';position:absolute;inset:8px;border:1px solid rgba(201,168,76,.2);border-radius:6px;pointer-events:none}
.card-back::after{content:'✦';font-size:2.2rem;color:var(--gold);text-shadow:0 0 20px rgba(201,168,76,.5);animation:pulse-glow 2s ease-in-out infinite}
@keyframes pulse-glow{0%,100%{opacity:.6;text-shadow:0 0 10px rgba(201,168,76,.3)}50%{opacity:1;text-shadow:0 0 25px rgba(201,168,76,.7)}}
.card-back .card-pattern{position:absolute;inset:14px;border:1px solid rgba(201,168,76,.1);border-radius:4px;background:repeating-conic-gradient(rgba(201,168,76,.03) 0% 25%,transparent 0% 50%) 0 0/20px 20px;pointer-events:none}

.card-front{transform:rotateY(180deg);background:linear-gradient(180deg,#0d0520 0%,#1a0a3e 50%,#0d0520 100%);border:2px solid var(--gold);padding:.8rem .6rem;display:flex;flex-direction:column;align-items:center;justify-content:space-between;text-align:center}
.card-front::before{content:'';position:absolute;inset:6px;border:1px solid rgba(201,168,76,.25);border-radius:5px;pointer-events:none}
.card-front.reversed-front{transform:rotateY(180deg) rotateZ(180deg)}
.card-numeral{font-family:'Cinzel',serif;font-size:.65rem;color:var(--gold-lo);letter-spacing:.2em}
.card-name-en{font-family:'Cinzel',serif;font-size:.7rem;color:var(--gold);letter-spacing:.1em;margin-top:.1rem}
.card-name-kr{font-family:'Noto Serif KR',serif;font-size:1.05rem;color:var(--text);font-weight:600;margin:.15rem 0}
.card-symbol{font-size:2rem;margin:.1rem 0;filter:drop-shadow(0 0 8px rgba(201,168,76,.4))}
.card-direction{font-size:.6rem;padding:.12rem .4rem;border-radius:20px;margin-top:.1rem}
.card-direction.upright{color:var(--gold);background:rgba(201,168,76,.12);border:1px solid rgba(201,168,76,.2)}
.card-direction.reversed{color:var(--red-soft);background:rgba(207,102,85,.12);border:1px solid rgba(207,102,85,.2)}
.card-keywords{font-size:.5rem;color:var(--text-2);line-height:1.3;margin-top:.1rem}
.card-pos-label{position:absolute;top:-28px;left:50%;transform:translateX(-50%);font-family:'Noto Sans KR',sans-serif;font-size:.7rem;color:var(--text-2);white-space:nowrap;letter-spacing:.05em}
.card-slot.entering{animation:cardEnter .6s cubic-bezier(.4,0,.2,1) both}
@keyframes cardEnter{from{opacity:0;transform:translateY(80px) rotateX(30deg)}to{opacity:1;transform:translateY(0) rotateX(0)}}

/* ===== CARD SPOTLIGHT ===== */
#cardSpotlight{position:fixed;top:50%;left:50%;transform:translate(-50%,-58%);z-index:58;opacity:0;pointer-events:none;transition:opacity .6s cubic-bezier(.4,0,.2,1)}
#cardSpotlight.show{opacity:1}
.spotlight-card{width:160px;height:260px;background:linear-gradient(180deg,#0d0520 0%,#1a0a3e 50%,#0d0520 100%);border:2px solid var(--gold);border-radius:12px;padding:1rem .8rem;display:flex;flex-direction:column;align-items:center;justify-content:space-between;text-align:center;box-shadow:0 0 40px rgba(201,168,76,.3),0 0 80px rgba(201,168,76,.1);animation:spotlightAppear .6s ease-out,spotlightGlow 2s ease-in-out .6s infinite;position:relative}
.spotlight-card::before{content:'';position:absolute;inset:6px;border:1px solid rgba(201,168,76,.25);border-radius:8px;pointer-events:none}
.spotlight-card.reversed{transform:rotate(180deg)}
.spotlight-card .card-numeral{font-family:'Cinzel',serif;font-size:.65rem;color:var(--gold-lo);letter-spacing:.2em}
.spotlight-card .card-name-en{font-family:'Cinzel',serif;font-size:.7rem;color:var(--gold);letter-spacing:.1em;margin-top:.1rem}
.spotlight-card .card-name-kr{font-family:'Noto Serif KR',serif;font-size:1.05rem;color:var(--text);font-weight:600;margin:.15rem 0}
.spotlight-card .card-symbol{font-size:2rem;margin:.1rem 0;filter:drop-shadow(0 0 8px rgba(201,168,76,.4))}
.spotlight-card .card-direction{font-size:.6rem;padding:.12rem .4rem;border-radius:20px;margin-top:.1rem}
.spotlight-card .card-direction.upright{color:var(--gold);background:rgba(201,168,76,.12);border:1px solid rgba(201,168,76,.2)}
.spotlight-card .card-direction.reversed{color:var(--red-soft);background:rgba(207,102,85,.12);border:1px solid rgba(207,102,85,.2)}
.spotlight-card .card-keywords{font-size:.5rem;color:var(--text-2);line-height:1.3;margin-top:.1rem}
@keyframes spotlightAppear{from{opacity:0;transform:scale(.7) translateY(30px)}to{opacity:1;transform:scale(1) translateY(0)}}
@keyframes spotlightGlow{0%,100%{box-shadow:0 0 30px rgba(201,168,76,.25),0 0 60px rgba(201,168,76,.1)}50%{box-shadow:0 0 50px rgba(201,168,76,.4),0 0 100px rgba(201,168,76,.15)}}
.card-slot.card-locked{opacity:.45;pointer-events:none;filter:brightness(.6)}
.card-slot.card-locked:hover{transform:none}

/* ===== READING PANEL ===== */
#readingPanel{position:fixed;top:0;bottom:0;right:0;width:min(420px,90vw);z-index:70;background:var(--surface);border-left:1px solid var(--border);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);transform:translateX(100%);transition:transform .6s cubic-bezier(.4,0,.2,1);overflow-y:auto;padding:2rem 1.5rem}
#readingPanel.show{transform:translateX(0)}
.reading-close{position:absolute;top:1rem;right:1rem;background:none;border:1px solid var(--border);color:var(--text-2);width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;transition:all .2s}
.reading-close:hover{border-color:var(--gold);color:var(--gold)}
.reading-title{font-family:'Cinzel',serif;font-size:1rem;color:var(--gold);letter-spacing:.2em;margin-bottom:1.5rem}
.reading-card-section{margin-bottom:1.5rem;padding-bottom:1.5rem;border-bottom:1px solid rgba(201,168,76,.1)}
.reading-card-header{font-family:'Noto Serif KR',serif;font-size:.95rem;color:var(--gold-hi);margin-bottom:.4rem}
.reading-card-pos{font-size:.7rem;color:var(--purple);margin-bottom:.6rem}
.reading-interp{font-family:'Noto Serif KR',serif;font-size:.88rem;line-height:1.8;color:var(--text);font-weight:300}
.reading-interp p{margin-bottom:.5rem}
.char-label{font-weight:500;margin-right:.3rem}
.char-label.bt-label{color:var(--gold)}
.char-label.rb-label{color:#e0a070}
.reading-summary{background:rgba(123,110,240,.08);border:1px solid rgba(123,110,240,.15);border-radius:12px;padding:1.2rem;margin-top:1rem}
.reading-summary-title{font-family:'Cinzel',serif;font-size:.8rem;color:var(--purple);letter-spacing:.15em;margin-bottom:.6rem}

/* ===== CHARACTER SELECT ===== */
#charSelect{position:fixed;inset:0;z-index:90;display:flex;align-items:center;justify-content:center;background:rgba(6,3,15,.85);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);opacity:0;pointer-events:none;transition:opacity .6s}
#charSelect.show{opacity:1;pointer-events:auto}
.char-select-inner{text-align:center;max-width:480px;padding:2rem}
.char-select-title{font-family:'Cinzel',serif;font-size:clamp(.85rem,2.5vw,1.1rem);color:var(--gold);letter-spacing:.3em;margin-bottom:.5rem}
.char-select-sub{font-family:'Noto Serif KR',serif;font-size:.85rem;color:var(--text-2);margin-bottom:2rem;font-weight:300}
.char-select-options{display:flex;gap:1.2rem;justify-content:center;flex-wrap:wrap}
.char-sel-btn{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:1.5rem 1.8rem;cursor:pointer;transition:all .35s;text-align:center;min-width:140px;position:relative;overflow:hidden}
.char-sel-btn::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 50% 80%,rgba(201,168,76,.06),transparent 70%);pointer-events:none}
.char-sel-btn:hover{border-color:var(--gold);box-shadow:0 0 24px rgba(201,168,76,.15);transform:translateY(-4px)}
.char-sel-btn:active{transform:scale(.97)}
.char-sel-emoji{font-size:2.8rem;display:block;margin-bottom:.6rem}
.char-sel-name{font-family:'Cinzel',serif;font-size:.9rem;color:var(--gold);letter-spacing:.1em}
.char-sel-desc{font-size:.72rem;color:var(--text-2);margin-top:.3rem;line-height:1.4}

/* ===== RESTART ===== */
#restartBtn{position:fixed;bottom:1.5rem;right:1.5rem;z-index:80;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:.6rem 1.2rem;color:var(--text-2);font-size:.8rem;cursor:pointer;opacity:0;transition:all .3s;pointer-events:none;font-family:'Noto Sans KR',sans-serif}
#restartBtn.show{opacity:1;pointer-events:auto}
#restartBtn:hover{border-color:var(--gold);color:var(--gold)}

/* ===== RESPONSIVE ===== */
@media(max-width:600px){
  .card-slot{width:100px;height:165px}
  .card-name-kr{font-size:.85rem}
  .card-symbol{font-size:1.6rem}
  .card-name-en{font-size:.55rem}
  .dlg-text{font-size:.88rem}
  .sel-btn{min-width:100px;padding:.8rem 1rem}
  #cardArea{gap:.7rem}
  #readingPanel{width:100vw}
  .spotlight-card{width:130px;height:210px;padding:.8rem .6rem}
  .spotlight-card .card-symbol{font-size:1.6rem}
  .spotlight-card .card-name-kr{font-size:.9rem}
  #cardSpotlight{transform:translate(-50%,-62%)}
}
@media(max-width:380px){
  .card-slot{width:85px;height:140px}
  .card-name-kr{font-size:.75rem}
  .card-symbol{font-size:1.3rem}
  .spotlight-card{width:110px;height:180px;padding:.6rem .5rem}
  .spotlight-card .card-symbol{font-size:1.3rem}
  .spotlight-card .card-name-kr{font-size:.78rem}
  .sel-btn{min-width:85px;padding:.6rem .8rem}
  .sel-btn .sel-icon{font-size:1.2rem}
}
</style>
</head>
<body>

<div id="loader"><div class="loader-orb"></div><div class="loader-text">Loading...</div></div>
<div class="stars" id="stars"></div>
<canvas id="c3d"></canvas>

<div id="intro">
  <div class="curtain-l" id="curtainL"></div>
  <div class="curtain-r" id="curtainR"></div>
  <div class="intro-center" id="introCenter">
    <div class="intro-title">✦ STARLIGHT TAROT ✦</div>
    <div class="intro-sub">운명이 당신을 기다리고 있습니다</div>
  </div>
</div>

<div id="hud"><div class="hud-title">✦ Starlight Tarot ✦</div></div>

<div id="charSelect">
  <div class="char-select-inner">
    <div class="char-select-title">✦ CHOOSE YOUR GUIDE ✦</div>
    <div class="char-select-sub">오늘 밤, 누가 당신의 운명을 읽어드릴까요?</div>
    <div class="char-select-options">
      <div class="char-sel-btn" onclick="selectChar('bt')">
        <span class="char-sel-emoji">🤵</span>
        <div class="char-sel-name">바텐더</div>
        <div class="char-sel-desc">신비롭고 차분한 안내인</div>
      </div>

        <span class="char-sel-emoji">🐰</span>

<script>
// =============================================
//  DEBUG CONSOLE — intercept all console output
// =============================================
(function(){
  var _logs = [];
  var _maxLogs = 500;
  var _origLog = console.log, _origWarn = console.warn, _origErr = console.error, _origInfo = console.info;

  function _ts(){var d=new Date();return ('0'+d.getHours()).slice(-2)+':'+('0'+d.getMinutes()).slice(-2)+':'+('0'+d.getSeconds()).slice(-2)+'.'+('00'+d.getMilliseconds()).slice(-3);}

  function _capture(level, args){
    var msg = Array.prototype.map.call(args, function(a){
      if(a instanceof Error) return a.message + '\n' + (a.stack||'');
      if(typeof a === 'object') try{ return JSON.stringify(a); }catch(e){ return String(a); }
      return String(a);
    }).join(' ');
    _logs.push({time:_ts(), level:level, msg:msg});
    if(_logs.length > _maxLogs) _logs.shift();
    _renderEntry(_logs[_logs.length-1]);
  }

  function _renderEntry(entry){
    var el = document.getElementById('debugLogs');
    if(!el) return;
    var div = document.createElement('div');
    div.className = 'debug-entry ' + entry.level;
    div.innerHTML = '<span class="debug-time">' + entry.time + '</span>' + _esc(entry.msg);
    el.appendChild(div);
    el.scrollTop = el.scrollHeight;
  }

  function _esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

  console.log   = function(){ _origLog.apply(console, arguments);   _capture('log', arguments); };
  console.info  = function(){ _origInfo.apply(console, arguments);  _capture('info', arguments); };
  console.warn  = function(){ _origWarn.apply(console, arguments);  _capture('warn', arguments); };
  console.error = function(){ _origErr.apply(console, arguments);   _capture('error', arguments); };

  // Catch uncaught errors
  window.addEventListener('error', function(e){
    _capture('error', ['[UNCAUGHT] ' + e.message + ' at ' + (e.filename||'?') + ':' + (e.lineno||'?')]);
  });
  window.addEventListener('unhandledrejection', function(e){
    _capture('error', ['[PROMISE] ' + (e.reason && e.reason.message ? e.reason.message : String(e.reason))]);
  });

  // UI wiring (after DOM ready)
  function _initDebugUI(){
    var toggle = document.getElementById('debugToggle');
    var panel = document.getElementById('debugPanel');
    var logs = document.getElementById('debugLogs');
    if(!toggle || !panel) return;

    toggle.addEventListener('click', function(){ panel.classList.toggle('show'); });
    document.getElementById('debugClose').addEventListener('click', function(){ panel.classList.remove('show'); });
    document.getElementById('debugClear').addEventListener('click', function(){ _logs=[]; logs.innerHTML=''; });
    document.getElementById('debugCopy').addEventListener('click', function(){
      var text = _logs.map(function(l){ return '['+l.time+'] ['+l.level.toUpperCase()+'] '+l.msg; }).join('\n');
      if(navigator.clipboard && navigator.clipboard.writeText){
        navigator.clipboard.writeText(text).then(function(){
          var btn = document.getElementById('debugCopy');
          btn.textContent='✅ Copied!'; setTimeout(function(){btn.textContent='📋 Copy';},1500);
        });
      } else {
        var ta = document.createElement('textarea'); ta.value=text; document.body.appendChild(ta);
        ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
        var btn = document.getElementById('debugCopy');
        btn.textContent='✅ Copied!'; setTimeout(function(){btn.textContent='📋 Copy';},1500);
      }
    });

    // Render existing logs
    _logs.forEach(_renderEntry);
  }

  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded', _initDebugUI);
  else _initDebugUI();
})();

  var jong = (c >= 0xAC00 && c <= 0xD7A3) ? (c - 0xAC00) % 28 : 0;

function posCyl(mesh, a, b) {
  if(!_v1){ _v1 = new THREE.Vector3(); _v2 = new THREE.Vector3(); }
  _v1.addVectors(a, b).multiplyScalar(0.5); mesh.position.copy(_v1);
  _v2.subVectors(b, a); mesh.scale.y = _v2.length(); _v2.normalize();
  var q = new THREE.Quaternion(); q.setFromUnitVectors(new THREE.Vector3(0,1,0), _v2);
  mesh.quaternion.copy(q);
}
function getElbow(sh, hd, sign) {
  return new THREE.Vector3((sh.x+hd.x)*0.5 + sign*0.1, (sh.y+hd.y)*0.5+0.08, (sh.z+hd.z)*0.5-0.06);
}
function updateArms() {
  if (!btArmUpperL) return;
  var eL = getElbow(btShoulderL, btHandLPos, -1);
  posCyl(btArmUpperL, btShoulderL, eL); posCyl(btArmLowerL, eL, btHandLPos);
  btHandL.position.copy(btHandLPos);
  var eR = getElbow(btShoulderR, btHandRPos, 1);
  posCyl(btArmUpperR, btShoulderR, eR); posCyl(btArmLowerR, eR, btHandRPos);
  btHandR.position.copy(btHandRPos);
}

/* ═══════ RABBIT LOADER ═══════ */
function loadRabbit() {
  if (typeof THREE === 'undefined' || !THREE.GLTFLoader) { console.warn('[LOAD] GLTFLoader 없음 — 토끼 모델 스킵'); return; }
  console.info('[LOAD] 토끼 모델 로딩 시작... (rabbit.glb)');
  new THREE.GLTFLoader().load('Models/rabbit.glb', function(gltf) {
    console.info('[LOAD] 토끼 모델 로드 완료');
    if (!isSceneReady) return;
    rabbitModel = gltf.scene;
    rabbitModel.traverse(function(c) {
      if (c.isMesh && c.material) {
        var old = c.material;
        var nm = new THREE.MeshBasicMaterial({
          map: old.map || null,
          color: old.map ? 0xffffff : (old.color || new THREE.Color(0xcccccc)),
          transparent: old.transparent || false,
          opacity: old.opacity !== undefined ? old.opacity : 1,
          side: old.side !== undefined ? old.side : THREE.FrontSide
        });
        if (nm.map) nm.map.encoding = THREE.LinearEncoding;
        c.material = nm;
      }
    });
    var box = new THREE.Box3().setFromObject(rabbitModel);
    var sz = new THREE.Vector3(); box.getSize(sz);
    var maxDim = Math.max(sz.x, sz.y, sz.z);
    rabbitScale = 0.9 / maxDim;
    rabbitModel.scale.set(rabbitScale, rabbitScale, rabbitScale);
    box.setFromObject(rabbitModel);
    var center = new THREE.Vector3(); box.getCenter(center);
    rabbitModel.position.x = RB_X - center.x;
    rabbitModel.position.y = TABLE_Y + 0.04 - box.min.y;
    rabbitModel.position.z = RB_Z - center.z;
    rabbitBaseY = rabbitModel.position.y;
    rabbitModel.rotation.y = -0.3;
    scene.add(rabbitModel);
  }, undefined, function(err) {
    console.error('[LOAD] 토끼 모델 로드 실패:', err && err.message ? err.message : err);
  });
}

/* ═══════ BOKEH ═══════ */
function createBokeh() {
  var geo = new THREE.SphereGeometry(0.04, 6, 4);
  for (var i = 0; i < 25; i++) {
    var col = [0xffcc66, 0x8877ff, 0xff8855][i % 3];
    var mat = new THREE.MeshBasicMaterial({
      color: col, transparent: true, opacity: 0.06 + Math.random() * 0.1,
      blending: THREE.AdditiveBlending, depthWrite: false
    });
    var m = new THREE.Mesh(geo, mat);
    var x = (Math.random()-0.5)*5, y = 0.8+Math.random()*3.5, z = -3+Math.random()*4;
    m.position.set(x, y, z);
    var sc = 0.3+Math.random()*1.2; m.scale.set(sc,sc,sc);
    scene.add(m);
    bokehParticles.push({
      mesh:m, baseY:y, baseX:x,
      phY:Math.random()*6.28, phX:Math.random()*6.28,
      spY:0.15+Math.random()*0.25, spX:0.08+Math.random()*0.12,
      ampY:0.1+Math.random()*0.2, ampX:0.08+Math.random()*0.15
    });
  }
}

/* ═══════ ANIMATION — BARTENDER ═══════ */
function lv(t, d, sp, dt) {
  t.x += (d.x-t.x)*Math.min(sp*dt,1);
  t.y += (d.y-t.y)*Math.min(sp*dt,1);
  t.z += (d.z-t.z)*Math.min(sp*dt,1);
}

function animBartender(dt) {
  // Breathing
  if (btBody) {
    var br = Math.sin(animTime)*0.5+0.5;
    btBody.scale.x = 1+br*0.015; btBody.scale.z = 1+br*0.01;
    btBody.rotation.z = Math.sin(animTime*0.25)*0.006;
  }
  // Blink
  var bc = animTime % 4.2, bo = 1;
  if (bc>3.9&&bc<3.98) bo=0.08; else if(bc>4.02&&bc<4.08) bo=0.15;
  if (btEyeL) btEyeL.scale.y = bo;
  if (btEyeR) btEyeR.scale.y = bo;
  // Eye gaze
  var gx = Math.sin(animTime*0.5)*0.01, gy = Math.sin(animTime*0.38)*0.005;
  if (btPupilL){btPupilL.position.x=gx;btPupilL.position.y=gy;}
  if (btPupilR){btPupilR.position.x=gx;btPupilR.position.y=gy;}

  if (btAnimState==='talking') btAnim_talking(dt);
  else if (btAnimState==='thinking') btAnim_thinking(dt);
  else if (btAnimState==='surprised') btAnim_surprised(dt);
  else btAnim_idle(dt);

  updateArms();
}

function btAnim_idle(dt) {
  idleTimer+=dt; if(idleTimer>5){idleTimer=0;idleVariant=(idleVariant+1)%3;}
  var bL=Math.sin(animTime*1.3)*0.03, bR=Math.sin(animTime*1.3+0.7)*0.03;
  lv(btHandLPos,{x:btHandLRest.x,y:btHandLRest.y+bL,z:btHandLRest.z},5,dt);
  lv(btHandRPos,{x:btHandRRest.x,y:btHandRRest.y+bR,z:btHandRRest.z},5,dt);
  if(btHeadGroup){
    btHeadGroup.rotation.z=Math.sin(animTime*0.5)*0.02*(idleVariant===1?4:1);
    btHeadGroup.rotation.y=Math.sin(animTime*0.3)*(idleVariant===1?0.06:0.01);
    btHeadGroup.rotation.x=0;
  }
  if(btBrowL) btBrowL.position.y=0.09;
  if(btBrowR) btBrowR.position.y=0.09;
}

function btAnim_talking(dt) {
  if(btHeadGroup){
    btHeadGroup.rotation.x=Math.sin(animTime*2.5)*0.04;
    btHeadGroup.rotation.z=Math.sin(animTime*1.8)*0.05;
    btHeadGroup.rotation.y=Math.sin(animTime*1.2)*0.04;
  }
  var g=Math.sin(animTime*2)*0.08;
  lv(btHandRPos,{x:btHandRRest.x-0.1,y:btHandRRest.y+0.15+g,z:btHandRRest.z-0.1},4,dt);
  lv(btHandLPos,{x:btHandLRest.x,y:btHandLRest.y+Math.sin(animTime*1.3)*0.02,z:btHandLRest.z},5,dt);
  if(btBrowL) btBrowL.position.y=0.1;
  if(btBrowR) btBrowR.position.y=0.1;
}

function btAnim_thinking(dt) {
  if(btHeadGroup){
    btHeadGroup.rotation.x=-0.06+Math.sin(animTime*0.8)*0.02;
    btHeadGroup.rotation.z=0.08;
    btHeadGroup.rotation.y=Math.sin(animTime*0.5)*0.03;
  }
  lv(btHandRPos,{x:BT_X+0.1,y:HEAD_Y-0.12,z:BT_Z+0.35},3,dt);
  lv(btHandLPos,{x:btHandLRest.x,y:btHandLRest.y+Math.sin(animTime)*0.02,z:btHandLRest.z},5,dt);
  if(btEyeL) btEyeL.scale.y=Math.min(btEyeL.scale.y,0.85);
  if(btEyeR) btEyeR.scale.y=Math.min(btEyeR.scale.y,0.85);
  if(btBrowL){btBrowL.position.y=0.082;btBrowL.rotation.z=0.15;}
  if(btBrowR){btBrowR.position.y=0.105;btBrowR.rotation.z=-0.05;}
}

function btAnim_surprised(dt) {
  if(btHeadGroup){btHeadGroup.rotation.x=-0.08;btHeadGroup.rotation.z=Math.sin(animTime*4)*0.03;}
  if(btEyeL) btEyeL.scale.set(1.15,1.15,1);
  if(btEyeR) btEyeR.scale.set(1.15,1.15,1);
  if(btBrowL) btBrowL.position.y=0.115;
  if(btBrowR) btBrowR.position.y=0.115;
  lv(btHandRPos,{x:btHandRRest.x-0.1,y:btHandRRest.y+0.2,z:btHandRRest.z-0.05},6,dt);
  lv(btHandLPos,{x:btHandLRest.x+0.1,y:btHandLRest.y+0.15,z:btHandLRest.z-0.05},6,dt);
}

/* ═══════ ANIMATION — RABBIT ═══════ */
function animRabbit(dt) {
  if (!rabbitModel) return;
  var s = rabbitScale;
  if (rbAnimState==='talking') {
    var sq = 1+Math.sin(animTime*8)*0.06;
    var st = 1+Math.sin(animTime*8+Math.PI)*0.04;
    rabbitModel.scale.set(s*st, s*sq, s*st);
    rabbitModel.rotation.y = -0.3+Math.sin(animTime*5)*0.08;
    rabbitModel.rotation.z = Math.sin(animTime*6.5)*0.06;
    rabbitModel.position.y = rabbitBaseY+Math.abs(Math.sin(animTime*7))*0.02;
  } else if (rbAnimState==='excited') {
    var bounce = Math.abs(Math.sin(animTime*6))*0.06;
    rabbitModel.position.y = rabbitBaseY+bounce;
    rabbitModel.rotation.y = -0.3+Math.sin(animTime*4)*0.15;
    rabbitModel.rotation.z = Math.sin(animTime*5)*0.1;
    rabbitModel.scale.set(s,s,s);
  } else {
    var bob = Math.sin(animTime*1.5)*0.008;
    rabbitModel.position.y = rabbitBaseY+bob;
    rabbitModel.rotation.y = -0.3+Math.sin(animTime*0.4)*0.03;
    rabbitModel.rotation.z = Math.sin(animTime*0.6)*0.015;
    var bsc = s*(1+Math.sin(animTime*1.5)*0.01);
    rabbitModel.scale.set(s, bsc, s);
  }
}

/* ═══════ ANIMATION — SCENE ═══════ */
function animScene(dt) {
  candleFlames.forEach(function(f) {
    f.mesh.position.y = f.baseY+Math.sin(animTime*8+f.ph)*0.008;
    var fs = 0.8+Math.sin(animTime*12+f.ph)*0.2;
    f.mesh.scale.x=fs; f.mesh.scale.z=fs;
    f.mesh.scale.y = 1.5+Math.sin(animTime*10+f.ph)*0.3;
  });
  if (crystalBall) {
    crystalBall.material.opacity = 0.3+Math.sin(animTime*1.5)*0.1;
    crystalBall.rotation.y += dt*0.2;
    if(crystalBall.children[0]){
      crystalBall.children[0].material.opacity = 0.3+Math.sin(animTime*2)*0.15;
      crystalBall.children[0].scale.setScalar(1+Math.sin(animTime*1.8)*0.15);
    }
  }
  bokehParticles.forEach(function(p) {
    p.mesh.position.y = p.baseY+Math.sin(animTime*p.spY+p.phY)*p.ampY;
    p.mesh.position.x = p.baseX+Math.sin(animTime*p.spX+p.phX)*p.ampX;
  });
}

/* ═══════ RENDER LOOP ═══════ */
function animate() {
  rafId = requestAnimationFrame(animate);
  if (!isSceneReady) return;
  var dt = Math.min(clock.getDelta(), 0.05);
  animTime += dt;
  animBartender(dt);
  animRabbit(dt);
  animScene(dt);
  renderer.render(scene, camera);
}

function initDlgRefs() {

  $dlgNext  = document.getElementById('dlgNext');
  $dlgBox   = document.getElementById('dlgBox');
  $options  = document.getElementById('options');
  $topicSel = document.getElementById('topicSelect');
  $spreadSel= document.getElementById('spreadSelect');
  $cardArea = document.getElementById('cardArea');
}

function say(ch, text, opts) {
  // Skip lines from non-selected character
  if (selectedChar && ch !== selectedChar) return;
  opts = opts || {};
  dlgQueue.push({ ch:ch, text:text, pause:opts.pause||0, onDone:opts.onDone||null, anim:opts.anim||null });
  if (!dlgTyping && dlgQueue.length===1) processMsg();
}

function processMsg() {
  if (!dlgQueue.length) {
    dlgTyping = false;
    if (dlgCallback) { var cb=dlgCallback; dlgCallback=null; cb(); }
    return;
  }
  var msg = dlgQueue[0];
  dlgTyping = true;

  if (msg.ch==='bt') {
    $dlgIcon.className='dlg-icon bt'; $dlgIcon.textContent='🤵';
    $dlgName.className='dlg-name'; $dlgName.textContent='바텐더';
    btAnimState = msg.anim || 'talking'; rbAnimState = 'idle';
  } else {
    $dlgIcon.className='dlg-icon rb'; $dlgIcon.textContent='🐰';
    $dlgName.className='dlg-name rb-name'; $dlgName.textContent='루나';
    rbAnimState = msg.anim || 'talking'; btAnimState = 'idle';
  }

  $dlg.classList.add('show');
  $dlgNext.classList.add('hidden');
  $dlgText.textContent = '';
  dlgFullText = msg.text; dlgCharIdx = 0;
  setTimeout(typeNext, msg.pause || 0);
}

function typeNext() {
  if (dlgCharIdx < dlgFullText.length) {
    dlgCharIdx++;
    $dlgText.textContent = dlgFullText.substring(0, dlgCharIdx);
    dlgTypeTimer = setTimeout(typeNext, TYPE_SPEED);
  } else {
    $dlgNext.classList.remove('hidden');
    // Keep animation if next message is same character (avoids jerky reset)
    var nextSameCh = dlgQueue.length > 1 && dlgQueue[1].ch === dlgQueue[0].ch;
    if (!nextSameCh) { btAnimState='idle'; rbAnimState='idle'; }
  }
}

function advDlg() {
  if (dlgTyping && dlgCharIdx<dlgFullText.length) {
    clearTimeout(dlgTypeTimer);
    dlgCharIdx=dlgFullText.length;
    $dlgText.textContent=dlgFullText;
    $dlgNext.classList.remove('hidden');
    var nextSameCh = dlgQueue.length > 1 && dlgQueue[1].ch === dlgQueue[0].ch;
    if (!nextSameCh) { btAnimState='idle'; rbAnimState='idle'; }
    return;
  }
  dlgQueue.shift();
  if (dlgQueue.length) processMsg();
  else { dlgTyping=false; btAnimState='idle'; rbAnimState='idle'; if(dlgCallback){var cb=dlgCallback;dlgCallback=null;cb();} }
}

function hideDlg() {
  $dlg.classList.remove('show'); dlgQueue=[]; dlgTyping=false; clearTimeout(dlgTypeTimer);
}

function showOpts(opts) {
  hideDlg();
  $options.innerHTML='';
  opts.forEach(function(o) {
    var btn = document.createElement('button'); btn.className='opt-btn';
    btn.textContent=o.text;
    btn.onclick=function(){ $options.classList.remove('show'); o.action(); };
    $options.appendChild(btn);
  });
  setTimeout(function(){$options.classList.add('show');},300);
}

      var pl=document.createElement('div'); pl.className='card-pos-label'; pl.textContent=labels[idx];
      slot.appendChild(pl);

    var inner = document.createElement('div'); inner.className='card-inner';

    // Back
    var back = document.createElement('div'); back.className='card-back';
    var pat = document.createElement('div'); pat.className='card-pattern'; back.appendChild(pat);
    inner.appendChild(back);

    // Front
    var front = document.createElement('div');
    front.className = 'card-front' + (card.isReversed ? ' reversed-front' : '');

    front.innerHTML =
      '<div class="card-numeral">'+toRoman(card.number)+'</div>'+
      '<div class="card-name-en">'+card.name_en+'</div>'+
      '<div class="card-symbol">'+(CARD_SYMBOLS[card.number]||'✦')+'</div>'+
      '<div class="card-name-kr">'+card.name_kr+'</div>'+
      '<div class="card-direction '+(card.isReversed?'reversed':'upright')+'">'+(card.isReversed?'역위치 ↺':'정위치 ↑')+'</div>'+
      '<div class="card-keywords">'+(card.isReversed?card.keywords.reversed:card.keywords.upright).slice(0,3).join(' · ')+'</div>';

    inner.appendChild(front);
    slot.appendChild(inner);

    slot.onclick = function() {
      if(slot.classList.contains('flipped') || slot.classList.contains('card-locked')) return;
      slot.classList.add('flipped');
      flippedCount++;
      hideDlg();
      setTimeout(function(){ playReactionAndRead(card, idx); }, 900);

    $cardArea.appendChild(slot);

  setTimeout(function(){$cardArea.classList.add('show');},200);
}

/* ═══════ PER-CARD REACTION + READING ═══════ */
function playReactionAndRead(card, idx) {
  var pool;
  if (selectedChar === 'bt') {
    pool = card.isReversed ? RX_BT_REV : RX_BT_UP;
  } else {
    pool = card.isReversed ? RX_RB_REV : RX_RB_UP;
  }
  var rx = pool[Math.floor(Math.random()*pool.length)];
  rx.forEach(function(r){ say(r.c, r.t, {pause:r.pause||0}); });

  // After reaction dialogue, show spotlight and deliver this card's reading
  dlgCallback = function() {
    // Hide card area, show spotlight
    $cardArea.classList.remove('show');
    showCardSpotlight(card);

    // Deliver this card's reading lines
    var cardReading = storedReadings.cards[idx];
    var ch = selectedChar;
    cardReading.lines.forEach(function(line) {
      say(ch, line);
    });

    // After reading, hide spotlight and proceed
    dlgCallback = function() {
      hideCardSpotlight();

      if (flippedCount < drawnCards.length) {
        // More cards to flip — show card area and unlock next card
        $cardArea.classList.add('show');
        var slots = $cardArea.querySelectorAll('.card-slot');
        if (slots[flippedCount]) slots[flippedCount].classList.remove('card-locked');

        // Prompt to flip next card
        if (ch === 'bt') {
          say('bt', pick([
            '...자, 다음 카드를 뒤집어 주세요.',
            '...이어서, 다음 카드를 선택해 주세요.',
            '...그럼, 다음 카드를 눌러주세요.'
          ]));
        } else {
          say('rb', pick([
            '자~ 다음 카드를 뒤집어봐!',
            '다음 카드를 눌러봐~ 깡총!',
            '다음 카드가 기다리고 있어!'
          ]));
        }
        dlgCallback = function() { hideDlg(); };
      } else {
        // All cards read — proceed to synopsis or final
        if (storedReadings.synopsis) {
          deliverSynopsis();
        } else {
          deliverFinalMessage();
        }
      }
    };
  };
}

function toRoman(n){
  if(!n) return '0';
  var v=[10,9,5,4,1],s=['X','IX','V','IV','I'],r='';
  for(var i=0;i<v.length;i++) while(n>=v[i]){r+=s[i];n-=v[i];}
  return r;
}

function deliverSynopsis() {
  var ch = selectedChar;
  if (ch === 'bt') {
    say('bt', pick([
      '...그리고, 세 카드를 함께 놓고 보면 하나의 흐름이 보입니다.',
      '...이제 세 카드를 하나의 이야기로 이어보겠습니다.',
      '...각각의 카드도 의미가 있지만, 셋을 함께 보면 더 큰 그림이 보이지요.'
    ]), {anim:'thinking', pause:500});
  } else {
    say('rb', pick([
      '...있잖아~ 세 카드를 같이 보면 이야기가 하나로 이어지거든!',
      '...자~ 이제 세 카드를 연결해볼게. 하나의 흐름이 보여!',
      '...각각도 의미 있지만, 셋을 같이 보면 네 이야기가 더 선명해져, 깡총~'
    ]), {pause:400});
  }

  storedReadings.synopsis.forEach(function(line) {
    say(ch, line);
  });

  dlgCallback = deliverFinalMessage;
}

function deliverFinalMessage() {
  var ch = selectedChar;
  storedReadings.final.forEach(function(line) {
    say(ch, line);
  });

  dlgCallback = showReplayOptions;
}

function showReplayOptions() {
  var opts = [];

  storedReadings.cards.forEach(function(card, i) {
    var label = storedReadings.cards.length === 1
      ? '🃏 카드 해석 다시 듣기'
      : '🃏 ' + card.cardName + ' 해석 다시 듣기';
    opts.push({
      text: label,
      action: (function(idx) { return function() { replayCard(idx); }; })(i)
    });
  });

  if (storedReadings.synopsis) {
    opts.push({
      text: '🔮 종합 흐름 다시 듣기',
      action: replaySynopsis
    });
  }

  opts.push({
    text: '✨ 충분히 들었어요',
    action: endReading
  });

  if (selectedChar === 'bt') {
    say('bt', '...혹시 다시 듣고 싶은 부분이 있으시다면, 말씀해 주세요.');
  } else {
    say('rb', '다시 듣고 싶은 부분이 있으면 골라봐~ 깡총!');
  }
  dlgCallback = function() {
    showOpts(opts);
  };
}

function replayCard(idx) {
  var card = drawnCards[idx];
  var cardReading = storedReadings.cards[idx];
  var ch = selectedChar;
  showCardSpotlight(card);
  cardReading.lines.forEach(function(line) {
    say(ch, line);
  });
  dlgCallback = function() {
    hideCardSpotlight();
    showReplayOptions();
  };
}

function replaySynopsis() {
  var ch = selectedChar;
  storedReadings.synopsis.forEach(function(line) {
    say(ch, line);
  });
  dlgCallback = showReplayOptions;
}

function endReading() {
  var ch = selectedChar;
  if (ch === 'bt') {
    say('bt', '오늘 밤의 별빛이 당신에게 좋은 길을 비춰주기를... 언제든 다시 찾아오세요.');
  } else {
    say('rb', '또 보고 싶으면 언제든 와~ 별빛은 항상 여기 있으니까, 깡총!');
  }
  dlgCallback = function() {
    hideDlg();
    document.getElementById('restartBtn').classList.add('show');
  };
}

    } else {

           '이 에너지를 억지로 잡으려 하지 않아도 돼. 그냥 흘러가게 두면서, 살짝 방향만 의식해봐. 그것만으로 충분해.']));

    result.cards.push({
      cardName: card.name_kr,
      lines: lines
    });

  // ── Synopsis for 3-card spread ──
  if (selectedSpread === 3 && drawnCards.length === 3) {

    ];

  return result;
}

function generateSynopsis(ch, tl) {
  var lines = [];
  var c0 = drawnCards[0], c1 = drawnCards[1], c2 = drawnCards[2];
  var r0 = c0.isReversed, r1 = c1.isReversed, r2 = c2.isReversed;
  var kw0 = (r0 ? c0.keywords.reversed : c0.keywords.upright)[0];
  var kw1 = (r1 ? c1.keywords.reversed : c1.keywords.upright)[0];
  var kw2 = (r2 ? c2.keywords.reversed : c2.keywords.upright)[0];

  if (ch === 'bt') {
    lines.push(tl + '에 관해 세 장이 그리는 이야기가 있습니다. \'' + kw0 + '\'에서 \'' + kw1 + '\'' + j(kw1,'을/를') + ' 거쳐 \'' + kw2 + '\'' + j(kw2,'으로/로') + '... 지금 당신의 흐름이 이 방향을 가리키고 있습니다.');
    lines.push('과거의 ' + c0.name_kr + j(c0.name_kr,'이/가') + ' 남긴 에너지가 현재의 ' + c1.name_kr + j(c1.name_kr,'을/를') + ' 만들었고, 그것이 다시 미래의 ' + c2.name_kr + j(c2.name_kr,'으로/로') + ' 이어지고 있습니다.' + (r2 ? ' 다만 미래의 카드가 역위치이니, \'' + kw2 + '\'의 에너지가 막히지 않도록 지금부터 준비해 두시는 것이 좋겠습니다.' : ' \'' + kw2 + '\'의 에너지가 자연스럽게 찾아올 수 있도록, 지금부터 그 흐름을 열어두세요.'));
    lines.push('각 카드의 메시지를 떠올리면서, 이 연결이 지금 당신에게 어떻게 닿는지 느껴보시기 바랍니다.');
  } else {
    lines.push(tl + '에 관해 세 카드가 하나의 이야기를 하고 있어. \'' + kw0 + '\'에서 \'' + kw1 + '\'' + j(kw1,'을/를') + ' 지나 \'' + kw2 + '\'' + j(kw2,'으로/로') + '... 이게 지금 네 흐름이야.');
    lines.push(c0.name_kr + j(c0.name_kr,'이/가') + ' 심어놓은 씨앗이 ' + c1.name_kr + j(c1.name_kr,'을/를') + ' 거쳐서 ' + c2.name_kr + j(c2.name_kr,'으로/로') + ' 피어나려 하고 있어.' + (r2 ? ' 근데 마지막 카드가 거꾸로니까, \'' + kw2 + '\' 부분은 좀 신경 써줘야 할 것 같아.' : ' \'' + kw2 + '\'의 에너지가 다가올 수 있게 마음을 열어둬.'));
    lines.push('세 카드를 같이 보면 네 이야기가 보여. 각각의 메시지를 떠올리면서, 지금 네 마음에 어떻게 닿는지 느껴봐.');
  }

  return lines;
}

function startGame() {
  initDlgRefs();
  $dlgBox.addEventListener('click', function(e){ if(!e.target.closest('.opt-btn')) advDlg(); });
  document.getElementById('readingClose').addEventListener('click',function(){ document.getElementById('readingPanel').classList.remove('show'); });
  document.getElementById('restartBtn').addEventListener('click', resetGame);
  playIntro();
}

function playIntro() {
  setTimeout(function(){ document.getElementById('introCenter').classList.add('hidden'); }, 2200);
  setTimeout(function(){
    document.getElementById('curtainL').classList.add('open');
    document.getElementById('curtainR').classList.add('open');
  }, 2800);
  setTimeout(function(){
    document.getElementById('intro').style.display='none';
    document.getElementById('hud').classList.add('show');
    document.getElementById('charSelect').classList.add('show');
  }, 4800);
}

window.selectChar = selectChar;
function selectChar(ch) {
  selectedChar = ch;
  document.getElementById('charSelect').classList.remove('show');

  // Toggle 3D model visibility
  if (ch === 'bt') {
    if (rabbitModel) rabbitModel.visible = false;
    if (btGroup) btGroup.visible = true;
    if (btArmUpperL) btArmUpperL.visible = true;
    if (btArmLowerL) btArmLowerL.visible = true;
    if (btArmUpperR) btArmUpperR.visible = true;
    if (btArmLowerR) btArmLowerR.visible = true;
    if (btHandL) btHandL.visible = true;
    if (btHandR) btHandR.visible = true;
  } else {
    if (btGroup) btGroup.visible = false;
    if (btArmUpperL) btArmUpperL.visible = false;
    if (btArmLowerL) btArmLowerL.visible = false;
    if (btArmUpperR) btArmUpperR.visible = false;
    if (btArmLowerR) btArmLowerR.visible = false;
    if (btHandL) btHandL.visible = false;
    if (btHandR) btHandR.visible = false;
    if (rabbitModel) rabbitModel.visible = true;
  }

  // Shift camera to center on selected character
  if (camera) {
    var cx = (ch === 'bt') ? BT_X : RB_X;
    var cz = (ch === 'bt') ? BT_Z : RB_Z;
    camera.position.set(cx, 2.2, cz + 3.5);
    camera.lookAt(cx, 0.9, cz);
  }

  setTimeout(phaseGreeting, 400);
}

function onSpreadPicked() {
  if (selectedChar==='bt') {
    say('bt','좋습니다. 마음을 가라앉히시고...',{anim:'thinking',pause:300});
    say('bt','카드를 선택해 주세요. 끌리는 카드를 눌러 뒤집으시면 됩니다.');
  } else {
    say('rb','자~ 마음을 가라앉히고... 끌리는 카드를 눌러봐! 카드가 널 부르고 있을 거야, 깡총~',{anim:'talking'});
  }
  dlgCallback=function(){
    hideDlg();
    flippedCount=0;
    drawCards(selectedSpread);
    storedReadings = generateAllReadings();
    showCards();
  };
}

function resetGame() {
  document.getElementById('readingPanel').classList.remove('show');
  document.getElementById('restartBtn').classList.remove('show');
  $cardArea.classList.remove('show');
  $cardArea.innerHTML='';
  hideCardSpotlight();
  hideDlg();
  drawnCards=[]; flippedCount=0; selectedTopic=''; selectedSpread=1;
  btAnimState='idle'; rbAnimState='idle'; storedReadings=null;
  // Show character select again
  document.getElementById('charSelect').classList.add('show');
}

/* ═══════ STARS ═══════ */
function createStars() {
  var c=document.getElementById('stars');
  for(var i=0;i<40;i++){
    var s=document.createElement('div'); s.className='star';
    s.style.left=Math.random()*100+'%'; s.style.top=Math.random()*100+'%';
    s.style.setProperty('--dur',(3+Math.random()*4)+'s');
    s.style.setProperty('--delay',(Math.random()*5)+'s');
    s.style.setProperty('--bright',(0.3+Math.random()*0.5)+'');
    var sz=1+Math.random()*3; s.style.width=sz+'px'; s.style.height=sz+'px';
    c.appendChild(s);
  }
}

/* ═══════ INIT ═══════ */
function hideLoader() {
  var loader = document.getElementById('loader');
  if(loader && !loader.classList.contains('hidden')) {
    loader.classList.add('hidden');
    console.info('[INIT] 로더 숨김');
  }
}

function init() {
  console.info('[INIT] 초기화 시작');
  createStars();

  // 안전장치: 15초 후에도 로딩 중이면 강제 진행
  var _loadTimeout = setTimeout(function(){
    console.warn('[INIT] 로딩 15초 초과 — 강제 진행');
    hideLoader();
    if(typeof startGame === 'function') startGame();
  }, 15000);

  loadCards(function(){
    console.info('[INIT] 카드 로드 콜백 → Three.js 로딩');
    initThree(function(){
      console.info('[INIT] Three.js 콜백 → 씬 구성');
      if(typeof THREE !== 'undefined') {
        setupScene();
        console.info('[INIT] 씬 구성 완료');
      } else {
        console.error('[INIT] THREE 객체 없음 — 3D 씬 생성 불가');
      }
      clearTimeout(_loadTimeout);
      setTimeout(function(){
        hideLoader();
        startGame();
        console.info('[INIT] 게임 시작!');
      }, 1200);
    });
  });
}

if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',init);
else init();

})();
</script>
</body>
