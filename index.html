<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>타로 — 신탁의 시간</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Noto+Serif+KR:wght@300;400;600&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#04040d;
  --surface:#0e0e20;
  --card-bg:#131328;
  --border:#1e1e40;
  --gold:#c9a84c;
  --gold-hi:#e8c96d;
  --gold-lo:#7a6230;
  --gold-glow:rgba(201,168,76,.22);
  --silver:#8a8ab0;
  --purple:#7b6ef0;
  --text:#e4e0d8;
  --text-2:#9090b8;
  --text-3:#4a4a72;
  --rev:#cf6655;
}
html{scroll-behavior:smooth}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

/* canvas bg */
#cvs{position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.55}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 60% at 15% 10%,rgba(80,65,200,.1) 0%,transparent 60%),radial-gradient(ellipse 60% 50% at 85% 85%,rgba(201,168,76,.06) 0%,transparent 55%);pointer-events:none;z-index:0}

/* layout */
.wrap{position:relative;z-index:1;max-width:980px;margin:0 auto;padding:0 1.5rem 6rem}

/* header */
.hdr{text-align:center;padding:3rem 1rem 1.5rem;position:relative;z-index:1}
.hdr-eyebrow{font-family:'Cinzel',serif;font-size:.6rem;letter-spacing:.45em;color:var(--gold-lo);text-transform:uppercase;margin-bottom:.8rem}
.hdr-title{font-family:'Cinzel',serif;font-size:clamp(1.7rem,4vw,2.6rem);font-weight:400;letter-spacing:.22em;color:var(--gold);text-shadow:0 0 50px rgba(201,168,76,.35)}
.hdr-line{width:100px;height:1px;background:linear-gradient(90deg,transparent,var(--gold-lo),transparent);margin:1rem auto 0}

/* ── PHASE 0: 주제 선택 ─────────────────── */
#p0{animation:fadeUp .7s ease both}
.p-lead{font-family:'Noto Serif KR',serif;font-size:1rem;font-weight:300;color:var(--silver);text-align:center;margin-bottom:2.5rem;letter-spacing:.04em}

.topic-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:1rem;margin-bottom:1.8rem}
.topic-btn{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:1.6rem 1.2rem;cursor:pointer;transition:all .3s cubic-bezier(.4,0,.2,1);color:var(--text);text-align:center;position:relative;overflow:hidden}
.topic-btn::after{content:'';position:absolute;inset:0;opacity:0;transition:opacity .35s;border-radius:13px}
.topic-btn[data-t=love]::after   {background:radial-gradient(ellipse at center,rgba(207,102,85,.15),transparent 70%)}
.topic-btn[data-t=career]::after {background:radial-gradient(ellipse at center,rgba(201,168,76,.13),transparent 70%)}
.topic-btn[data-t=finance]::after{background:radial-gradient(ellipse at center,rgba(90,160,66,.12),transparent 70%)}
.topic-btn[data-t=general]::after{background:radial-gradient(ellipse at center,rgba(123,110,240,.15),transparent 70%)}
.topic-btn:hover::after,.topic-btn.on::after{opacity:1}
.topic-btn:hover,.topic-btn.on{border-color:var(--gold-lo);transform:translateY(-3px);box-shadow:0 8px 30px rgba(0,0,0,.45),0 0 0 1px rgba(201,168,76,.12)}
.topic-btn.on{border-color:var(--gold);box-shadow:0 8px 30px rgba(0,0,0,.5),0 0 20px var(--gold-glow)}
.topic-icon{font-size:1.9rem;margin-bottom:.55rem;display:block;position:relative;z-index:1}
.topic-btn[data-t=love]   .topic-icon{color:#e88}
.topic-btn[data-t=career] .topic-icon{color:var(--gold)}
.topic-btn[data-t=finance].topic-icon{color:#7c4}
.topic-btn[data-t=general].topic-icon{color:var(--purple)}
.topic-name{font-family:'Noto Serif KR',serif;font-size:.95rem;font-weight:600;color:var(--text);margin-bottom:.25rem;position:relative;z-index:1}
.topic-desc{font-size:.72rem;color:var(--text-2);position:relative;z-index:1}

.cq-wrap{margin-bottom:1.8rem}
.cq-wrap label{display:block;font-size:.72rem;color:var(--text-3);letter-spacing:.1em;margin-bottom:.5rem}
.cq-input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:.8rem 1.2rem;color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:.9rem;outline:none;transition:border-color .3s,box-shadow .3s}
.cq-input::placeholder{color:var(--text-3)}
.cq-input:focus{border-color:var(--gold-lo);box-shadow:0 0 0 3px rgba(201,168,76,.07)}

.spread-sect{margin-bottom:2.5rem}
.spread-sect label{display:block;font-size:.72rem;color:var(--text-3);letter-spacing:.1em;margin-bottom:.7rem}
.spread-tabs{display:flex;gap:.6rem}
.spread-tab{flex:1;padding:.9rem 1rem;background:var(--surface);border:1px solid var(--border);border-radius:10px;color:var(--text-2);cursor:pointer;font-family:'Noto Sans KR',sans-serif;font-size:.85rem;transition:all .3s;text-align:center}
.spread-tab:hover{border-color:var(--gold-lo);color:var(--text)}
.spread-tab.on{border-color:var(--gold);color:var(--gold);background:rgba(201,168,76,.06);box-shadow:0 0 15px rgba(201,168,76,.1)}
.spread-tab .tt{font-weight:500;margin-bottom:.2rem}
.spread-tab .ts{font-size:.7rem;color:var(--text-3)}
.spread-tab.on .ts{color:var(--gold-lo)}

.start-btn{display:block;width:100%;max-width:360px;margin:0 auto;padding:1rem 2rem;background:linear-gradient(135deg,#c9a84c,#a07828);border:none;border-radius:50px;color:#06040a;font-family:'Cinzel',serif;font-size:.9rem;font-weight:700;letter-spacing:.18em;cursor:pointer;transition:all .35s;box-shadow:0 4px 22px rgba(201,168,76,.28)}
.start-btn:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(201,168,76,.45);background:linear-gradient(135deg,#e8c96d,#c9a84c)}

/* ── PHASE 1: 카드 선택 ──────────────────── */
#p1{display:none;animation:fadeUp .6s ease both}
.back-btn{display:inline-flex;align-items:center;gap:.4rem;background:none;border:none;color:var(--text-2);font-size:.78rem;cursor:pointer;padding:.4rem 0;margin-bottom:1.5rem;transition:color .2s;font-family:'Noto Sans KR',sans-serif}
.back-btn:hover{color:var(--gold)}
.sel-hdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:1.5rem;flex-wrap:wrap;gap:.6rem}
.sel-hdr-l h2{font-family:'Noto Serif KR',serif;font-size:1.1rem;font-weight:400;color:var(--text);margin-bottom:.2rem}
.sel-hdr-l p{font-size:.76rem;color:var(--text-2)}
.t-badge{display:inline-flex;align-items:center;gap:.4rem;background:rgba(201,168,76,.07);border:1px solid var(--gold-lo);border-radius:20px;padding:.32rem .9rem;font-size:.75rem;color:var(--gold)}

/* preview slots */
.preview{display:flex;justify-content:center;gap:.9rem;margin-bottom:1.8rem;flex-wrap:wrap}
.slot{background:var(--surface);border:1px dashed var(--border);border-radius:10px;padding:.55rem 1.1rem;min-width:100px;text-align:center;transition:all .3s}
.slot .sl{font-size:.62rem;color:var(--text-3);letter-spacing:.1em;text-transform:uppercase;margin-bottom:.25rem}
.slot .sn{font-family:'Noto Serif KR',serif;font-size:.88rem;color:var(--gold);font-weight:600}
.slot .so{font-size:.62rem;margin-top:.18rem;min-height:.85rem}
.slot.filled{border-style:solid;border-color:var(--gold-lo)}
.ori-u{color:var(--gold-lo)}
.ori-r{color:var(--rev)}

/* card grid */
.card-grid{display:grid;grid-template-columns:repeat(11,1fr);gap:5px;margin-bottom:1.5rem}
.tc{aspect-ratio:2/3;border-radius:6px;overflow:hidden;border:1px solid #1c1c40;cursor:pointer;transition:all .25s;background:linear-gradient(155deg,#141430,#0d0d22);position:relative}
.tc::before{content:'';position:absolute;inset:3px;border:1px solid #222248;border-radius:3px;background:repeating-linear-gradient(45deg,transparent,transparent 4px,rgba(35,35,75,.25) 4px,rgba(35,35,75,.25) 5px),repeating-linear-gradient(-45deg,transparent,transparent 4px,rgba(35,35,75,.25) 4px,rgba(35,35,75,.25) 5px);pointer-events:none}
.tc::after{content:attr(data-ord);position:absolute;top:3px;right:3px;background:var(--gold);color:#06040a;width:16px;height:16px;border-radius:50%;display:none;align-items:center;justify-content:center;font-size:.58rem;font-weight:700;z-index:2}
.tc.sel::after{display:flex}
.tc-rom{position:absolute;bottom:4px;left:0;right:0;text-align:center;font-family:'Cinzel',serif;font-size:.52rem;color:var(--text-3);pointer-events:none}
.tc:hover{border-color:var(--gold-lo);transform:translateY(-4px) scale(1.06);box-shadow:0 6px 20px rgba(0,0,0,.65),0 0 10px rgba(201,168,76,.1);z-index:2}
.tc.sel{border-color:var(--gold);box-shadow:0 0 18px rgba(201,168,76,.35);background:linear-gradient(155deg,#201d46,#18153a)}
.tc.dis{opacity:.2;pointer-events:none;filter:grayscale(.5)}

.read-btn{display:none;margin:0 auto;padding:.85rem 2.8rem;background:linear-gradient(135deg,var(--gold),#a07828);color:#06040a;border:none;border-radius:50px;font-family:'Cinzel',serif;font-size:.88rem;font-weight:700;letter-spacing:.14em;cursor:pointer;transition:all .3s;box-shadow:0 4px 20px rgba(201,168,76,.28)}
.read-btn:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(201,168,76,.5)}
.read-btn.vis{display:block}

/* ── PHASE 2: 리딩 결과 ──────────────────── */
#p2{display:none;animation:fadeUp .8s ease both}
#p2.on{display:block}
.r-hdr{text-align:center;margin-bottom:2.5rem}
.r-sub{font-size:.68rem;color:var(--text-3);letter-spacing:.18em;text-transform:uppercase;margin-bottom:.45rem;font-family:'Cinzel',serif}
.r-topic{font-family:'Noto Serif KR',serif;font-size:1rem;color:var(--gold)}

/* synthesis box */
.syn-box{background:linear-gradient(135deg,rgba(80,65,200,.09),rgba(201,168,76,.06));border:1px solid rgba(201,168,76,.18);border-radius:16px;padding:1.8rem 2rem;margin-bottom:2.5rem;position:relative}
.syn-box::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--gold-lo),transparent)}
.syn-label{font-family:'Cinzel',serif;font-size:.6rem;letter-spacing:.28em;color:var(--gold-lo);text-transform:uppercase;margin-bottom:.8rem}
.syn-text{font-family:'Noto Serif KR',serif;font-size:1rem;line-height:1.9;color:var(--text);font-weight:300}
.syn-text em{font-style:normal;color:var(--gold-hi);font-weight:600}

/* spread */
.spread{display:grid;grid-template-columns:repeat(3,1fr);gap:1.5rem;margin-bottom:2rem}
.spread.s1{grid-template-columns:minmax(0,400px);justify-content:center}

/* flip card */
.fc{perspective:1400px;min-height:440px}
.fc.s1{min-height:500px}
.fc-inner{position:relative;width:100%;height:100%;min-height:inherit;transition:transform 1s cubic-bezier(.4,0,.2,1);transform-style:preserve-3d}
.fc.flipped .fc-inner{transform:rotateY(180deg)}
.fc-front,.fc-back{position:absolute;inset:0;backface-visibility:hidden;border-radius:14px}

/* card front (face-down) */
.fc-front{background:linear-gradient(155deg,#141430,#0d0d22);border:1px solid #1e1e42;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1.2rem}
.fc-front-pos{font-family:'Cinzel',serif;font-size:.58rem;letter-spacing:.28em;color:var(--text-3);text-transform:uppercase}
.fc-front-art{width:65%;height:65%;border:1px solid #272750;border-radius:8px;display:flex;align-items:center;justify-content:center;position:relative;background:repeating-linear-gradient(45deg,transparent,transparent 6px,rgba(35,35,75,.2) 6px,rgba(35,35,75,.2) 7px),repeating-linear-gradient(-45deg,transparent,transparent 6px,rgba(35,35,75,.2) 6px,rgba(35,35,75,.2) 7px)}
.fc-front-art::before,.fc-front-art::after{content:'';position:absolute;border-radius:5px}
.fc-front-art::before{inset:8px;border:1px solid rgba(123,110,240,.25)}
.fc-front-art::after{inset:16px;border:1px solid rgba(201,168,76,.12)}
.fc-sym{font-family:'Cinzel',serif;font-size:1.5rem;color:rgba(123,110,240,.45);position:relative;z-index:1}
.fc-hint{font-size:.68rem;color:var(--text-3);animation:pulse 2.2s ease infinite}

/* card back (face-up = reading) */
.fc-back{transform:rotateY(180deg);border:1px solid var(--border);display:flex;flex-direction:column}

/* element themes */
.fc-back.air  {background:linear-gradient(155deg,#16163c,#0e0e28);border-color:rgba(123,110,240,.3)}
.fc-back.water{background:linear-gradient(155deg,#0e1c38,#090f22);border-color:rgba(74,144,212,.3)}
.fc-back.fire {background:linear-gradient(155deg,#2a1808,#180e04);border-color:rgba(212,112,48,.3)}
.fc-back.earth{background:linear-gradient(155deg,#0e200a,#081404);border-color:rgba(90,158,66,.3)}

.fc-back.air::before   {content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,#7b6ef0,transparent)}
.fc-back.water::before {content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,#4a90d4,transparent)}
.fc-back.fire::before  {content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,#d47030,transparent)}
.fc-back.earth::before {content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,#5a9e42,transparent)}

/* card art canvas area */
.card-art-area{width:100%;flex-shrink:0;overflow:hidden;border-radius:0;position:relative}
.card-art-area svg{width:100%;height:auto;display:block}

/* card info */
.card-info{padding:1.2rem 1.3rem;flex:1;display:flex;flex-direction:column;gap:0}
.c-pos{font-family:'Cinzel',serif;font-size:.58rem;letter-spacing:.25em;color:var(--text-3);text-transform:uppercase;margin-bottom:.4rem}
.c-name{font-family:'Noto Serif KR',serif;font-size:1.25rem;font-weight:600;color:var(--gold-hi);line-height:1.2;margin-bottom:.28rem}
.c-num{font-family:'Cinzel',serif;font-size:.7rem;color:var(--text-2);margin-bottom:.18rem}
.c-num.rev{color:var(--rev)}
.c-ori{font-size:.66rem;margin-bottom:.85rem;padding-bottom:.75rem;border-bottom:1px solid rgba(255,255,255,.05)}
.ori-up{color:var(--gold-lo)}
.ori-rv{color:var(--rev)}
.c-kw{display:flex;flex-wrap:wrap;gap:.32rem;margin-bottom:.85rem}
.c-kw span{padding:.2rem .5rem;border-radius:20px;font-size:.66rem}
.air  .c-kw span{background:rgba(123,110,240,.14);color:#9b8ef8;border:1px solid rgba(123,110,240,.2)}
.water.c-kw span{background:rgba(74,144,212,.14);color:#6ab0e8;border:1px solid rgba(74,144,212,.2)}
.fire .c-kw span{background:rgba(212,112,48,.14);color:#e09060;border:1px solid rgba(212,112,48,.2)}
.earth.c-kw span{background:rgba(90,158,66,.14);color:#7abe60;border:1px solid rgba(90,158,66,.2)}
.fc-back.rev-card .c-kw span{filter:brightness(.7) saturate(.6)}

.c-reading{font-family:'Noto Serif KR',serif;font-size:.87rem;line-height:1.85;color:var(--text);font-weight:300;flex:1;white-space:pre-line}
.fc-back.rev-card .c-reading{color:#a8a0c0}
.c-reading-cursor{display:inline-block;width:2px;height:1em;background:var(--gold);opacity:.8;vertical-align:text-bottom;animation:blink .8s step-end infinite;margin-left:1px}
@keyframes blink{0%,100%{opacity:.8}50%{opacity:0}}

/* reset */
.reset-area{text-align:center;margin-top:2rem;display:flex;gap:1rem;justify-content:center;flex-wrap:wrap}
.r-btn{padding:.6rem 2rem;background:transparent;color:var(--text-2);border:1px solid var(--border);border-radius:30px;font-size:.8rem;cursor:pointer;transition:all .3s;font-family:'Noto Sans KR',sans-serif}
.r-btn:hover{border-color:var(--gold-lo);color:var(--gold)}
.r-btn.pri{background:rgba(201,168,76,.07);border-color:var(--gold-lo);color:var(--gold)}
.r-btn.pri:hover{background:rgba(201,168,76,.14)}

/* loading */
.ld-overlay{display:none;position:fixed;inset:0;background:rgba(4,4,13,.92);z-index:200;align-items:center;justify-content:center;flex-direction:column;gap:1.2rem;backdrop-filter:blur(6px)}
.ld-overlay.on{display:flex}
.ld-spin{width:46px;height:46px;border:2px solid rgba(201,168,76,.13);border-top-color:var(--gold);border-radius:50%;animation:spin 1.2s linear infinite}
.ld-txt{font-family:'Noto Serif KR',serif;color:var(--silver);font-size:.86rem;font-weight:300;letter-spacing:.05em}

/* viewer */
.vtgl{position:fixed;bottom:1rem;right:1rem;background:rgba(14,14,32,.8);border:1px solid var(--border);color:var(--text-3);padding:.38rem .9rem;border-radius:20px;cursor:pointer;font-size:.68rem;z-index:50;font-family:'Noto Sans KR',sans-serif;backdrop-filter:blur(4px);transition:all .2s}
.vtgl:hover{border-color:var(--gold-lo);color:var(--gold)}
.vwr{display:none;position:fixed;inset:0;background:rgba(4,4,13,.97);z-index:300;padding:2rem;overflow-y:auto}
.vwr.on{display:block}
.vwr h2{color:var(--gold);margin-bottom:1rem;font-family:'Cinzel',serif;font-weight:400}
.vwr-close{position:fixed;top:1rem;right:1rem;background:#7a2820;color:#fff;border:none;width:34px;height:34px;border-radius:50%;cursor:pointer;font-size:1.1rem;z-index:301}
.vstats{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:1rem;margin-bottom:2rem}
.vstat{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:1rem;text-align:center}
.vstat .n{font-size:1.8rem;color:var(--gold);font-weight:700;font-family:'Cinzel',serif}
.vstat .l{font-size:.7rem;color:var(--text-2);margin-top:.3rem}
.vsamp{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:1rem;margin-bottom:1rem}
.vsamp h4{color:var(--purple);margin-bottom:.5rem;font-size:.82rem}
.vsamp p{font-size:.82rem;margin-bottom:.3rem;color:var(--text)}
.vsamp .vl{color:var(--gold-lo);font-weight:700}

/* anims */
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:.35}50%{opacity:1}}

/* responsive */
@media(max-width:680px){
  .topic-grid{gap:.7rem}
  .topic-btn{padding:1.1rem .8rem}
  .card-grid{grid-template-columns:repeat(7,1fr);gap:4px}
  .spread{grid-template-columns:1fr;gap:1.2rem}
  .fc{min-height:340px}
  .spread.s1{grid-template-columns:1fr}
  .spread-tabs{flex-direction:column}
  .syn-box{padding:1.3rem}
}
@media(max-width:420px){
  .topic-grid{grid-template-columns:1fr}
  .card-grid{grid-template-columns:repeat(5,1fr)}
}
</style>
</head>
<body>
<canvas id="cvs"></canvas>

<header class="hdr">
  <div class="hdr-eyebrow">Oracle · Tarot · 신탁</div>
  <h1 class="hdr-title">신탁의 시간</h1>
  <div class="hdr-line"></div>
</header>

<main class="wrap">

<!-- Phase 0 -->
<div id="p0">
  <p class="p-lead">오늘 무엇이 궁금하신가요</p>
  <div class="topic-grid">
    <button class="topic-btn on" data-t="love" onclick="selTopic(this)">
      <span class="topic-icon">♡</span>
      <div class="topic-name">연애 · 관계</div>
      <div class="topic-desc">감정, 만남, 이별, 연인</div>
    </button>
    <button class="topic-btn" data-t="career" onclick="selTopic(this)">
      <span class="topic-icon">◈</span>
      <div class="topic-name">직업 · 커리어</div>
      <div class="topic-desc">일, 공부, 취업, 성과</div>
    </button>
    <button class="topic-btn" data-t="finance" onclick="selTopic(this)">
      <span class="topic-icon">◎</span>
      <div class="topic-name">재물 · 재정</div>
      <div class="topic-desc">돈, 투자, 기회, 풍요</div>
    </button>
    <button class="topic-btn" data-t="general" onclick="selTopic(this)">
      <span class="topic-icon">✦</span>
      <div class="topic-name">전반적인 흐름</div>
      <div class="topic-desc">인생, 방향, 내면, 성장</div>
    </button>
  </div>
  <div class="cq-wrap">
    <label>또는 직접 질문을 입력하세요 (선택)</label>
    <input id="cq" class="cq-input" type="text" placeholder="예: 지금 이 사람과 계속 만나야 할까요?" maxlength="60" oninput="cqVal=this.value.trim()">
  </div>
  <div class="spread-sect">
    <label>리딩 방식</label>
    <div class="spread-tabs">
      <button class="spread-tab" data-s="1" onclick="selSpread(this)">

// ROMAN & CONSTANTS
// ═══════════════════════════════════════════════════
const ROM=['0','I','II','III','IV','V','VI','VII','VIII','IX','X','XI','XII','XIII','XIV','XV','XVI','XVII','XVIII','XIX','XX','XXI'];
const PLAB3=['과거','현재','미래'];
const PKEYS=['past','present','future'];
const POS_U=['과거의 이 에너지가 지금의 당신을 만들어온 토대입니다.','지금 이 순간, 이 흐름이 당신을 감싸고 있습니다.','이 방향으로 나아가면 좋은 것들이 기다리고 있습니다.'];
const POS_R=['그 에너지가 내면 깊숙이 남아 지금도 영향을 주고 있습니다.','지금 이 에너지가 막혀 있거나 왜곡된 형태로 나타나고 있습니다.','아직 준비가 더 필요할 수 있습니다. 조급해하지 마세요.'];
const TNAME={love:'연애 · 관계',career:'직업 · 커리어',finance:'재물 · 재정',general:'전반적인 흐름'};
const TLAB={love:'♡ 연애 · 관계',career:'◈ 직업 · 커리어',finance:'◎ 재물 · 재정',general:'✦ 전반적인 흐름'};
const TKEY={love:'love',career:'career',finance:'finance',general:null};

// ═══════════════════════════════════════════════════
// KOREAN GRAMMAR HELPERS
// ═══════════════════════════════════════════════════
function ga(s){const c=s.charCodeAt(s.length-1);if(c<0xAC00||c>0xD7A3)return '이';return(c-0xAC00)%28===0?'가':'이';}
function eul(s){const c=s.charCodeAt(s.length-1);if(c<0xAC00||c>0xD7A3)return '을';return(c-0xAC00)%28===0?'를':'을';}
function eun(s){const c=s.charCodeAt(s.length-1);if(c<0xAC00||c>0xD7A3)return '은';return(c-0xAC00)%28===0?'는':'은';}
function i_ga(s){return ga(s)==='가'?'이':'가';} // opposite, for 이/가 alternation

// ── Pilot data (data/pilot.json 에서 lazy-load) ──
let _pilotData = null;
async function loadPilot() {
  if (_pilotData) return _pilotData;
  try {
    const r = await fetch('data/pilot.json');
    if (r.ok) _pilotData = await r.json();
  } catch(e) {}
  return _pilotData;
}


// ── State ──
let topic='love', cqVal='', spread=3;
let sel=[], orients={};
let bcache={}, idata=null;

// ── Phase 0 ──
function selTopic(btn){
  document.querySelectorAll('.topic-btn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  topic=btn.dataset.t;
  document.getElementById('cq').value='';
  cqVal='';
}
function selSpread(btn){
  document.querySelectorAll('.spread-tab').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  spread=parseInt(btn.dataset.s);
}
function goSel(){
  document.getElementById('p0').style.display='none';
  document.getElementById('p1').style.display='block';
  initSel();
}
function goBack(){
  document.getElementById('p1').style.display='none';
  document.getElementById('p0').style.display='block';
  sel=[];orients={};
}
function goHome(){
  document.getElementById('p2').classList.remove('on');
  document.getElementById('p2').style.display='none';
  document.getElementById('p0').style.display='block';
  sel=[];orients={};
}

// ── Phase 1 ──
function initSel(){
  const n=spread;
  document.getElementById('sel-title').textContent=n===1?'카드를 한 장 고르세요':'카드를 세 장 고르세요';
  document.getElementById('tbadge').textContent=cqVal||TLAB[topic];
  // slots
  const pv=document.getElementById('preview');
  pv.innerHTML='';
  const labs=n===1?['오늘의 메시지']:PLAB3;
  for(let i=0;i<n;i++){
    const s=document.createElement('div');
    s.className='slot';s.id='slot'+i;
    s.innerHTML=`<div class="sl">${labs[i]}</div><div class="sn">—</div><div class="so"></div>`;
    pv.appendChild(s);
  }
  initGrid();
  document.getElementById('rbtn').classList.remove('vis');
  sel=[];orients={};
}

function initGrid(){
  const g=document.getElementById('cgrid');
  g.innerHTML='';
  CD.forEach((c,i)=>{
    const d=document.createElement('div');
    d.className='tc';d.dataset.idx=i;
    d.innerHTML=`<span class="tc-rom">${ROM[i]}</span>`;
    d.onclick=()=>toggleCard(i);
    g.appendChild(d);
  });
}

function toggleCard(idx){
  const els=document.querySelectorAll('.tc');
  const el=els[idx];
  const ex=sel.indexOf(idx);
  if(ex>=0){
    sel.splice(ex,1);
    el.classList.remove('sel');
    delete el.dataset.ord;
    delete orients[idx];
    refreshSel();return;
  }
  if(sel.length>=spread)return;
  sel.push(idx);
  orients[idx]=Math.random()<0.5?'u':'r';
  el.classList.add('sel');
  el.dataset.ord=sel.length;
  refreshSel();
}

function refreshSel(){
  const n=spread;
  const labs=n===1?['오늘의 메시지']:PLAB3;
  for(let i=0;i<n;i++){
    const sl=document.getElementById('slot'+i);
    if(!sl)continue;
    const sn=sl.querySelector('.sn'),so=sl.querySelector('.so');
    if(i<sel.length){
      const idx=sel[i],o=orients[idx];
      sn.textContent=CD[idx].name;
      so.innerHTML=o==='u'?'<span class="ori-u">정방향</span>':'<span class="ori-r">역방향 ↻</span>';
      sl.classList.add('filled');
    } else {
      sn.textContent='—';so.innerHTML='';
      sl.classList.remove('filled');
    }
  }
  // reorder numbers
  document.querySelectorAll('.tc').forEach(el=>{
    const idx=parseInt(el.dataset.idx);
    const pos=sel.indexOf(idx);
    el.classList.remove('sel','dis');
    delete el.dataset.ord;
    if(pos>=0){el.classList.add('sel');el.dataset.ord=pos+1;}
  });
  if(sel.length>=spread){
    document.querySelectorAll('.tc:not(.sel)').forEach(el=>el.classList.add('dis'));
  }
  document.getElementById('rbtn').classList.toggle('vis',sel.length===spread);
}

// ── 한국어 조사 자동 선택 ──
function j(word,pair){
  const c=(word||'').slice(-1).charCodeAt(0);
  const jong=(c>=0xAC00&&c<=0xD7A3)?(c-0xAC00)%28:0;
  switch(pair){
    case'이/가':return jong?'이':'가';
    case'은/는':return jong?'은':'는';
    case'을/를':return jong?'을':'를';
    case'와/과':case'과/와':return jong?'과':'와';
    case'으로/로':return(jong===0||jong===8)?'로':'으로';
    case'이나/나':return jong?'이나':'나';
  }
  return '';
}

      :`지금 현재 자리에 ${c.name}${j(c.name,'이/가')} 있어요. 지금 이 순간 당신 주변에 이 에너지가 강하게 흐르고 있다는 뜻이에요. ${c.core.u} 지금 자신이 어떤 상황에 있는지, 이 카드가 상당히 정확하게 비춰주고 있을 거예요. 지금 느끼는 감정이나 상황을 이 카드의 에너지랑 한번 연결해봐요.`;

      :`앞으로의 자리에 ${c.name}${j(c.name,'이/가')} 나왔어요. 이 에너지가 앞으로 당신 삶 속으로 들어올 거예요. ${c.core.u} 이게 아직 일어나지 않은 일이니까, 지금부터 이 흐름을 의식하면서 그걸 어떻게 맞이할지를 조금씩 생각해두면 훨씬 수월하게 나아갈 수 있어요.`;

  const kwPart=isR
    ?`이 카드를 키워드로 풀면 '${kws[0]}', '${kws[1]}', '${kws[2]}' 이런 에너지들이에요. 역방향이니까 이것들이 지금 긍정적으로 나오기보다는, 반대 방향으로 왜곡되거나 과도하게 나타나고 있을 가능성이 높아요. 혹시 지금 '${kws[0]}' 쪽에서 뭔가 막히거나 힘들다는 느낌이 드는 게 있다면, 그게 바로 이 카드가 지금 당신에게 하고 싶은 말인 거예요. 거기서부터 천천히 풀어나가면 돼요.`

  // 4단락: 실질적 조언 (따뜻하고 구체적으로)
  const adviceU=[
    `과거가 남긴 흔적을 없애거나 바꿀 수는 없지만, 그 경험이 남겨준 것들을 지금 어떻게 쓸 수 있는지는 온전히 당신이 선택할 수 있어요. 이 카드가 과거 자리에서 말하는 건, 그 시간이 헛되지 않았다는 거예요. 어떤 경험이었든 간에, 그게 지금의 당신 안에 뭔가를 심어놨거든요. 그게 뭔지 찾아보는 것, 그게 지금 해볼 수 있는 가장 좋은 일이에요.`,
    `지금 이 에너지가 주변에 흐르고 있다는 걸 알았으니까, 오늘 하루 딱 한 가지만 해봐요. 이 카드가 말하는 방향으로 아주 작은 행동 하나만 실제로 움직여보는 거예요. 거창할 필요 없어요. 지금 이 시기엔 작은 것 하나가 생각보다 훨씬 큰 변화를 만들어낼 수 있거든요.`,
    `앞으로 이 에너지가 다가왔을 때 너무 긴장하지 않아도 돼요. 이 카드가 미래에 있다는 건, 당신이 그 흐름을 맞이할 준비가 되어가고 있다는 신호이기도 하거든요. 지금부터 이 에너지를 의식하면서, 그게 왔을 때 어떻게 반응하고 싶은지를 마음속으로 그려봐요. 준비된 사람한테는 같은 흐름도 훨씬 다르게 작용해요.`

    `막혀 있는 에너지를 억지로 풀려고 하면 오히려 더 단단해질 수 있어요. 지금은 그 흐름을 부드럽게 인식하는 것만으로도 충분해요. 어떤 두려움이나 저항이 있는지 솔직하게 바라보고, 자신한테 좀 너그러운 시간을 허락해봐요. 그게 지금 가장 필요한 일이에요.`,

  ];
  const advice=isR?adviceR[Math.min(pidx,2)]:adviceU[Math.min(pidx,2)];

  const parts=[intro];
  if(topicPart) parts.push(topicPart);
  return parts.join('\n\n');
}

function makeSynopsis(cards,ors){
  const tl=cqVal||TNAME[topic];
  const isR=ors.map(o=>o==='r');

  if(spread===1){
    const c=cards[0],r=isR[0];
    const kw=r?c.kw.r[0]:c.kw.u[0];
    const core=r?c.core.r:c.core.u;
    const snip=(TKEY[topic]&&c.snip[TKEY[topic]])||'';
    return `오늘 <em>${tl}</em>에 관해 <em>${c.name}</em> 카드가 나왔어요.`
      +` ${core}`
      +(snip?` ${snip}`:'')
      +` 오늘 하루 <em>${kw}</em>의 에너지가 어디서 느껴지는지 한번 살펴봐요.`;
  }

  // 3카드 전체 서사
  const [c0,c1,c2]=cards;
  const [r0,r1,r2]=isR;
  const kw0=r0?c0.kw.r[0]:c0.kw.u[0];
  const kw1=r1?c1.kw.r[0]:c1.kw.u[0];
  const kw2=r2?c2.kw.r[0]:c2.kw.u[0];
  const core0=r0?c0.core.r:c0.core.u;
  const core1=r1?c1.core.r:c1.core.u;
  const core2=r2?c2.core.r:c2.core.u;
  const ori0=r0?'역방향':'정방향';
  const ori1=r1?'역방향':'정방향';
  const ori2=r2?'역방향':'정방향';
  const sk=TKEY[topic];
  const snip1=sk?c1.snip[sk]:'';

  const p1openers=[
    `<em>${tl}</em>에 관해 세 장이 함께 그리는 이야기가 있어요.`
    +` <em>${kw0}</em>에서 <em>${kw1}</em>${j(kw1,'을/를')} 지나 <em>${kw2}</em>${j(kw2,'으로/로')}—지금 당신의 흐름이 이 방향을 가리키고 있어요.`,
    `지금 <em>${tl}</em>${j(tl,'을/를')} 놓고 보면, 세 카드가 하나의 흐름으로 이어져요.`
    +` <em>${c0.name}</em>, <em>${c1.name}</em>, <em>${c2.name}</em>—이 순서가 지금 당신의 이야기예요.`,
    `세 장을 나란히 놓고 보면 <em>${tl}</em>에 관한 그림이 보여요.`
    +` <em>${kw0}</em>의 시간을 지나, 지금 <em>${kw1}</em>의 자리에 있고, 앞으로 <em>${kw2}</em>${j(kw2,'이/가')} 기다리고 있어요.`
  ];
  const p1=p1openers[c0.n%3];

  const p2=`과거 자리의 <em>${c0.name}</em>${j(c0.name,'은/는')} 당신이 <em>${kw0}</em>의 에너지 속에서 이 여정을 시작해왔다는 걸 보여줘요.`
    +` ${core0}`
    +` 그 경험이 지금의 자리로 당신을 데려온 거예요.`;

  const p3=`지금 이 순간 현재 자리에는 <em>${c1.name}</em>${j(c1.name,'이/가')}${ori1==='역방향'?' 역방향으로':''} 있어요.`
    +` ${core1}`
    +(snip1?` ${tl} 쪽에서 보면, ${snip1}`:' 지금 당신이 서 있는 지점이 이 카드의 에너지와 맞닿아 있을 거예요.');

  const p4=`앞으로는 <em>${c2.name}</em>의 에너지가 기다리고 있어요.`
    +` ${core2}`
    +` 지금의 흐름이 이 방향으로 이어진다면 <em>${tl}</em>에서 새로운 국면이 열릴 가능성이 높아요.`
    +(r2?` 다만 역방향으로 나온 만큼, <em>${kw2}</em>의 에너지가 막히지 않도록 지금부터 준비해두는 게 좋아요.`:` <em>${kw2}</em>의 에너지가 자연스럽게 찾아올 수 있도록 지금부터 그 흐름을 열어두세요.`);

  const p5=`<em>${kw0}</em>${j(kw0,'이/가')} <em>${kw1}</em>${j(kw1,'을/를')} 만들고, 그게 다시 <em>${kw2}</em>${j(kw2,'으로/로')} 이어지는 흐름. 각 카드를 열어보면서 이 연결이 지금 당신에게 어떻게 닿는지 느껴봐요.`;

  return [p1,p2,p3,p4,p5].join('<br><br>');
}

// ── Start reading ──
async function startRead(){

  const cards=sel.map(i=>CD[i]);
  const ors=sel.map(i=>orients[i]);
  document.getElementById('ld').classList.add('on');

  let bkt=null;
  if(spread===3){
    const key=`${cards[0].id}_${cards[1].id}_${cards[2].id}_ur`;
    bkt=await fetchBkt(cards[0].id,key).catch(()=>null);
  }

  document.getElementById('ld').classList.remove('on');

  // switch to p2
  document.getElementById('p1').style.display='none';
  const p2=document.getElementById('p2');
  p2.style.display='block';
  p2.classList.add('on');

  document.getElementById('r-topic-name').textContent=cqVal||TNAME[topic];

  const syn=bkt?.synergy?bkt.synergy:makeSynopsis(cards,ors);
  typewrite(document.getElementById('syn-txt'),syn,true);

  const spEl=document.getElementById('spread');
  spEl.innerHTML='';
  spEl.className=spread===1?'spread s1':'spread';

      const sk=TKEY[topic];
      const topicLabel=cqVal||TNAME[topic];
      const topicSnip=sk?card.snip[sk]:'';
      const kws=isR?card.kw.r:card.kw.u;
      const oriNote=isR?`역방향으로 온 만큼, 지금 '${kws[0]}' 에너지가 어디서 막혀 있는지 조용히 들여다봐요.`:'';
      const topicNote=topicSnip?`${topicLabel} 쪽에서 보면, ${topicSnip}`:'';
      txt=[coreText,topicNote,oriNote].filter(Boolean).join('\n\n');
    } else {
      txt=getReadText(sel[i],i,o);
    }

    const kws=(isR?card.kw.r:card.kw.u).slice(0,3);
    const oriHtml=isR?'<span class="ori-rv">↻ 역방향</span>':'<span class="ori-up">↑ 정방향</span>';
    const artSVG=ARTS[card.id]||'';

    const fc=document.createElement('div');
    fc.className=`fc${spread===1?' s1':''}`;
    fc.innerHTML=`<div class="fc-inner">
      <div class="fc-front">
        <div class="fc-front-pos">${plabs[i]}</div>
        <div class="fc-front-art"><span class="fc-sym">✦</span></div>
        <div class="fc-hint">터치하여 열기</div>
      </div>
      <div class="fc-back ${card.el}${isR?' rev-card':''}">
        <div class="card-art-area">${artSVG}</div>
        <div class="card-info">
          <div class="c-pos">${plabs[i]}</div>
          <div class="c-name">${card.name}</div>
          <div class="c-num${isR?' rev':''}">${ROM[card.n]}${isR?' — 역방향':' — 정방향'}</div>
          <div class="c-ori">${oriHtml}</div>
          <div class="c-kw">${kws.map(k=>`<span>${k}</span>`).join('')}</div>
          <div class="c-reading" id="cr-${i}"></div>
        </div>
      </div>
    </div>`;
    spEl.appendChild(fc);

    // sequential flip + expand + typewriter
    setTimeout(()=>{
      fc.classList.add('flipped');
      setTimeout(()=>{
        // 플립 완료 후 카드 높이를 콘텐츠에 맞게 자동 확장
        const inner=fc.querySelector('.fc-inner');
        const back=fc.querySelector('.fc-back');
        const front=fc.querySelector('.fc-front');
        front.style.display='none';
        inner.style.cssText+='transform:none;transition:none;height:auto;';
        back.style.position='relative';
        back.style.transform='none';
        fc.style.minHeight='0';
        fc.style.height='auto';
        // 타이프라이터 시작
        const el=document.getElementById(`cr-${i}`);
        if(el) typewrite(el,txt,false);
      },1050);
    }, 500+i*900);
  });
}

async function fetchBkt(firstId,key){
  // 1차: web/ 버킷 (shard.py로 생성된 전체 데이터)
  if(!idata){
    const r=await fetch('web/index.json').catch(()=>null);
    if(r?.ok) idata=await r.json();
  }
  if(idata){
    const info=idata?.buckets?.[firstId];
    if(info){
      if(!bcache[firstId]){
        const r=await fetch(`web/buckets/${info.file}`).catch(()=>null);
        if(r?.ok) bcache[firstId]=await r.json();
      }
      if(bcache[firstId]?.[key]) return bcache[firstId][key];
    }
  }
  // 2차 fallback: data/pilot.json (파일럿 100개)
  const pilot=await loadPilot();
  return pilot?.[key]||null;
}

// ── Typewriter ──
function typewrite(el,html,isHtml){
  el.innerHTML='';
  if(isHtml){
    // parse to get plain segments with em markers
    const tmp=document.createElement('div');
    tmp.innerHTML=html;
    el.innerHTML=html;
    el.style.opacity='0';
    requestAnimationFrame(()=>{
      el.style.transition='opacity .6s ease';
      el.style.opacity='1';
    });
    return;
  }
  // plain text typewriter
  let i=0;
  const cursor=document.createElement('span');
  cursor.className='c-reading-cursor';
  el.appendChild(cursor);
  const timer=setInterval(()=>{
    el.insertBefore(document.createTextNode(html[i]),cursor);
    i++;
    if(i>=html.length){
      clearInterval(timer);
      setTimeout(()=>cursor.remove(),800);
    }
  },22);
}

function doReset(){
  sel=[];orients={};
  const p2=document.getElementById('p2');
  p2.classList.remove('on');p2.style.display='none';
  document.getElementById('p1').style.display='block';
  initSel();
}

// ── Starfield canvas ──
(function(){
  const cvs=document.getElementById('cvs');
  const ctx=cvs.getContext('2d');
  let stars=[];
  function resize(){
    cvs.width=innerWidth;cvs.height=innerHeight;
    stars=[];
    const cnt=Math.floor(cvs.width*cvs.height/3500);
    for(let i=0;i<cnt;i++) stars.push({
      x:Math.random()*cvs.width,y:Math.random()*cvs.height,
      r:Math.random()*1.3,a:Math.random(),
      sp:3e-4+Math.random()*1e-3,ph:Math.random()*Math.PI*2
    });
  }
  function draw(t){
    ctx.clearRect(0,0,cvs.width,cvs.height);
    stars.forEach(s=>{
      const a=s.a*(0.35+0.65*Math.sin(t*s.sp+s.ph));
      ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(200,205,255,${a})`;ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  resize();
  window.addEventListener('resize',resize);
  requestAnimationFrame(draw);
})();

// ── Viewer ──
async function toggleViewer(){
  const v=document.getElementById('vwr');
  if(v.classList.contains('on')){v.classList.remove('on');return;}
  v.classList.add('on');
  try{
    if(!idata){const r=await fetch('web/index.json');if(!r.ok)throw 0;idata=await r.json();}
    const bc=Object.keys(idata.buckets).length;
    document.getElementById('vstats').innerHTML=`
      <div class="vstat"><div class="n">${idata.total||0}</div><div class="l">총 해석 텍스트</div></div>
      <div class="vstat"><div class="n">${bc}</div><div class="l">버킷 수</div></div>
      <div class="vstat"><div class="n">v${idata.version||'?'}</div><div class="l">버전</div></div>`;
    const fid=Object.keys(idata.buckets)[0];
    const sa=document.getElementById('vsamps');
    sa.innerHTML='<h3 style="color:var(--text-2);margin-bottom:1rem;font-size:.88rem">샘플 데이터</h3>';
    if(fid){
      const info=idata.buckets[fid];
      const r2=await fetch(`web/buckets/${info.file}`);
      if(r2.ok){
        const d=await r2.json();
        Object.keys(d).slice(0,5).forEach(k=>{
          const v=d[k];
          const pts=k.replace('_ur','').split('_');
          const ns=[];for(let i=0;i<pts.length;i+=2){const id=`${pts[i]}_${pts[i+1]}`;const c=CD.find(c=>c.id===id);ns.push(c?c.name:id);}
          sa.innerHTML+=`<div class="vsamp"><h4>${ns.join(' → ')}</h4><p><span class="vl">과거:</span> ${v.past}</p><p><span class="vl">현재:</span> ${v.present}</p><p><span class="vl">미래:</span> ${v.future}</p><p><span class="vl">시너지:</span> ${v.synergy}</p></div>`;
        });
      }
    }
  } catch(e){
    document.getElementById('vstats').innerHTML='<div class="vstat"><div class="n">—</div><div class="l">데이터 없음 (shard.py 실행 후 확인)</div></div>';
  }
}
